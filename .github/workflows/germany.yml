name: GER

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        scraper: [cinemax,cinestar]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.1"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: |
          SCRIPT="${{ matrix.scraper }}.py"

          echo "Running $SCRIPT"

          for i in {1..6}; do
            echo "Attempt $i"

            if python $SCRIPT; then
              echo "$SCRIPT finished successfully"
              break
            fi

            echo "$SCRIPT failed. Retrying in 10 seconds..."
            sleep 10
          done

      - name: Commit scraper data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ nz/

          git commit -m "[skip ci] ${{ matrix.scraper }} update ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          sleep $((RANDOM % 10))

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push origin main; then
              echo "Push succeeded"
              break
            fi

            echo "Push failed. Retrying in 5 seconds..."
            sleep 5
          done


  merge:
    needs: scrape
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Ensure latest repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in {1..5}; do
            echo "Pull attempt $i"

            if git pull --rebase origin main; then
              echo "Repo updated"
              break
            fi

            echo "Retrying pull..."
            sleep 3
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.1"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run merger
        run: |
          echo "Running merger..."

          for i in {1..5}; do
            echo "Attempt $i"

            if python merger.py; then
              echo "Merger finished"
              break
            fi

            echo "Merger failed. Retrying..."
            sleep 10
          done

      - name: Commit merged data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ 

          git commit -m "Merged cinema data ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          sleep $((RANDOM % 10))

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push origin main; then
              echo "Push succeeded"
              break
            fi

            echo "Push failed. Retrying in 5 seconds..."
            sleep 5
          done